name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/TIPSolution.sln

      - name: Build
        run: dotnet build src/TIPSolution.sln -c Release --no-restore

      - name: Test
        run: dotnet test src/Test/Test.csproj -c Release --no-build --verbosity normal

      - name: Pack Core
        run: dotnet pack src/Core/Core.csproj -c Release --no-build -o ${{ github.workspace }}/.artifacts/packages

      - name: Pack AspNetCore
        run: dotnet pack src/AspNetCore/Tip.TransactionStandard.AspNetCore.csproj -c Release --no-build -o ${{ github.workspace }}/.artifacts/packages

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: .artifacts/packages/*.nupkg
